[build]
builder = "dockerfile"
dockerfilePath = "artifacts/api-server/Dockerfile"

[deploy]
startCommand = "node --enable-source-maps dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "api"
source = "."

[[services]]
name = "web"
source = "."

[services.web.build]
dockerfilePath = "artifacts/traffic-forge/Dockerfile"
